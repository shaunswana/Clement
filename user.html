<!DOCTYPE html>
<html>
<head>
    <title>Fun Finders - Users</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>🏆 Registered Players</h1>

    <table>
        <tr>
            <th>Name</th>
            <th>Surname</th>
            <th>Email</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td>{{ user[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/">Back to Registration</a>
</div>

</body>
</html>
